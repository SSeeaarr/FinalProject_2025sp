<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Adventure</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1127.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aws-amplify/dist/aws-amplify.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
            border: 1px solid #333;
        }
        #loading {
            position: absolute;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading game...</div>
    <canvas id="gameCanvas"></canvas>
    
    <script type="module" src="./game.js"></script>
    <script>
        // Hide loading message when game is ready
        window.addEventListener('gameLoaded', () => {
            document.getElementById('loading').style.display = 'none';
        });
    </script>
</body>
</html>
